# yi-hack-v5 Multi-WiFi Configuration
#
# This file is used when WIFI_MULTI=yes in system.conf.
# It allows the camera to connect to multiple WiFi networks,
# automatically falling back to the next available network if
# the preferred one is not reachable.
#
# Edit this file with your WiFi networks. Add as many network={}
# blocks as you need. Higher priority = tried first.
#
# To generate a hashed PSK (recommended), run on a Linux machine:
#   wpa_passphrase "YourSSID" "YourPassword"
# Then replace the psk="..." line with the output psk=<hash>
#
# Place this file on the SD card at:
#   /tmp/sd/yi-hack-v5/etc/wpa_supplicant.conf

ctrl_interface=/var/run/wpa_supplicant
update_config=0

# Network 1 - highest priority (tried first)
network={
    ssid="MyNetwork_Location1"
    psk="password1"
    priority=3
}

# Network 2
network={
    ssid="MyNetwork_Location2"
    psk="password2"
    priority=2
}

# Network 3 - lowest priority (tried last)
network={
    ssid="MyNetwork_Location3"
    psk="password3"
    priority=1
}
